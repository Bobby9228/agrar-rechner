<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d5016">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mais-Rechner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4e8;
      min-height: 100vh;
      padding: 20px;
      color: #1a1a1a;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #2d5016;
      font-size: 1.8rem;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 1rem;
      color: #2d5016;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8f0de;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.2rem;
      border: 2px solid #d0deb8;
      border-radius: 10px;
      background: #fafef5;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #4a7c23;
    }
    input::placeholder {
      color: #aaa;
    }
    .error-msg {
      font-size: 0.8rem;
      color: #d32f2f;
      margin-top: 4px;
      min-height: 18px;
    }
    .unit {
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      background: #4a7c23;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active {
      background: #3a6318;
      transform: scale(0.98);
    }
    .result {
      background: #e8f4dc;
      border: 2px solid #4a7c23;
    }
    .result h2 {
      border-bottom-color: #c3dfa8;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #c3dfa8;
    }
    .result-row:last-child {
      border-bottom: none;
    }
    .result-row .label {
      font-size: 0.95rem;
      color: #444;
    }
    .result-row .value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2d5016;
    }
    .result-row .value.small {
      font-size: 1rem;
    }
    .info {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌾 Mais-Rechner</h1>
    <p class="subtitle">Säcke &amp; Dünger für Aussaat</p>

    <div class="card">
      <h2>📐 Fläche &amp; Dichte</h2>
      <div class="field">
        <label for="hektar">Hektar</label>
        <input type="number" id="hektar" placeholder="z.B. 12.5" step="0.1" min="0">
        <div class="error-msg" id="err_hektar"></div>
      </div>
      <div class="field">
        <label for="koerner">Körner pro Hektar</label>
        <input type="number" id="koerner" placeholder="z.B. 90000" min="0">
        <div class="unit">üblich: 80.000 – 100.000</div>
        <div class="error-msg" id="err_koerner"></div>
      </div>
    </div>

    <div class="card">
      <h2>🧪 Dünger</h2>
      <div class="field">
        <label for="duenger">Dünger (kg/ha)</label>
        <input type="number" id="duenger" placeholder="z.B. 150" min="0">
        <div class="unit">Kilogramm pro Hektar</div>
      </div>
    </div>

    <button class="btn" onclick="berechne()">Berechnen</button>

    <div id="results" style="display:none; margin-top:16px;">
      <div class="card result">
        <h2>📦 Ergebnis</h2>
        <div class="result-row">
          <span class="label">Benötigte Körner</span>
          <span class="value" id="r_körner">—</span>
        </div>
        <div class="result-row">
          <span class="label">Säcke Maissaat (50.000)</span>
          <span class="value" id="r_säcke">—</span>
        </div>
        <div class="result-row">
          <span class="label">Dünger gesamt</span>
          <span class="value" id="r_duenger">—</span>
        </div>
        <div class="result-row">
          <span class="label">Benötigte Säcke</span>
          <span class="value small" id="r_info">—</span>
        </div>
      </div>
    </div>

    <p class="info">Daten werden nur lokal gespeichert – keine Internetverbindung nötig</p>
  </div>

  <script>
    function berechne() {
      document.getElementById('err_hektar').textContent = '';
      document.getElementById('err_koerner').textContent = '';
      document.getElementById('hektar').style.borderColor = '';
      document.getElementById('koerner').style.borderColor = '';

      const h = parseFloat(document.getElementById('hektar').value);
      const k = parseFloat(document.getElementById('koerner').value);
      const d = parseFloat(document.getElementById('duenger').value);

      let valid = true;
      if (isNaN(h) || h <= 0) {
        document.getElementById('err_hektar').textContent = 'Bitte Hektar eingeben';
        document.getElementById('hektar').style.borderColor = '#d32f2f';
        valid = false;
      }
      if (isNaN(k) || k <= 0) {
        document.getElementById('err_koerner').textContent = 'Bitte Körner pro ha eingeben';
        document.getElementById('koerner').style.borderColor = '#d32f2f';
        valid = false;
      }
      if (!valid) return;

      const körnerGesamt = h * k;
      const säcke = Math.ceil(körnerGesamt / 50000);
      const duengerGesamt = isNaN(d) || d <= 0 ? null : h * d;

      document.getElementById('r_körner').textContent = körnerGesamt.toLocaleString('de-DE');
      document.getElementById('r_säcke').textContent = säcke + ' Stück';

      const duengerEl = document.getElementById('r_duenger');
      const infoEl = document.getElementById('r_info');
      const sackLabel = säcke === 1 ? 'Sack' : 'Säcke';

      if (duengerGesamt !== null) {
        duengerEl.textContent = duengerGesamt.toLocaleString('de-DE') + ' kg';
        infoEl.textContent = duengerGesamt.toLocaleString('de-DE') + ' kg Dünger, ' + säcke + ' ' + sackLabel + ' Saat';
      } else {
        duengerEl.textContent = '—';
        infoEl.textContent = säcke + ' ' + sackLabel + ' Saat (ohne Dünger)';
      }

      document.getElementById('results').style.display = 'block';
    }
  </script>
</body>
</html>
