<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Test</title>
</head>
<body>
  <h1>Debug Test</h1>
  <input type="number" id="h" placeholder="Hektar">
  <input type="number" id="k" placeholder="Körner">
  <button onclick="berechne()">Berechnen</button>
  <div id="out">—</div>

  <script>
    function berechne() {
      const h = parseFloat(document.getElementById('h').value);
      const k = parseFloat(document.getElementById('k').value);
      if (isNaN(h) || isNaN(k)) {
        document.getElementById('out').textContent = 'FEHLER: Eingaben prüfen';
        return;
      }
      const körner = h * k;
      const säcke = Math.ceil(körner / 50000);
      document.getElementById('out').textContent = körner + ' Körner, ' + säcke + ' Sack/Säcke';
    }
  </script>
</body>
</html>
